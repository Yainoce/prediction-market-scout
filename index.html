<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prediction Market Scout</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 16px;
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      margin-top: 8px;
    }

    .edge {
      font-size: 24px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Prediction Market Scout</h1>
    <p>iPad MVP</p>
  </div>

  <div class="card">
    <label>Market Probability (%)</label>
    <input id="market" type="number" value="45">

    <label>Your Estimate (%)</label>
    <input id="fair" type="number" value="60">

    <div style="margin-top:20px;">
      Edge:
      <span id="edge" class="edge">15%</span>
    </div>
  </div>

  <script>
    const market = document.getElementById('market');
    const fair = document.getElementById('fair');
    const edge = document.getElementById('edge');

    function update() {
      edge.textContent =
        (Number(fair.value) - Number(market.value)) + '%';
    }

    market.addEventListener('input', update);
    fair.addEventListener('input', update);
    update();
  </script>

</body>
</html>
